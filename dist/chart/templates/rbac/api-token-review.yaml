{{- if and .Values.api.enable (eq (.Values.api.authMode | default "none") "token") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "kube-freeze-operator.name" . }}
    name: {{ include "kube-freeze-operator.resourceName" (dict "suffix" "api-token-review" "context" $) }}
rules:
    - apiGroups:
        - authentication.k8s.io
      resources:
        - tokenreviews
      verbs:
        - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "kube-freeze-operator.name" . }}
    name: {{ include "kube-freeze-operator.resourceName" (dict "suffix" "api-token-review" "context" $) }}
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: {{ include "kube-freeze-operator.resourceName" (dict "suffix" "api-token-review" "context" $) }}
subjects:
    - kind: ServiceAccount
      name: {{ include "kube-freeze-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      namespace: {{ .Release.Namespace }}
{{- end }}
